openapi: 3.0.3

info:
  title: WasaPhoto
  
  description: API documentation for the WasaPhoto project.
  version: 1.0.0

security:
  - BearerAuth: [] 
tags:
  - name: "User"
    description: "Endpoints for user actions"
  - name: "User interaction"
    description: "Endpoints for interactions between users"
  - name: "Photo"
    description: "Endpoints for users' own photo actions"
  - name: "Photo interaction"
    description: "Endpoints for interactions with other users' photos"


paths:
  /session:
    post:
      tags: ["User"]
      summary: doLogin - Logs in the user.
      description: |
        If the user does not exist, a new user is created and its ID is
        returned. Otherwise, the ID of the existing user is returned.
      operationId: doLogin
      requestBody:
        description: User details
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/user"
      responses:
        '200':
          description: User log-in successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserToken"
        '401':
          description: Action unauthorized - invalid user token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '500':
          description: Internal server error

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"

  #updating username  
  /users/{username}/username:
    parameters:
    - $ref: "#/components/parameters/username"
    put:
      tags: ["User"]
      summary: setMyUserName - Changes the username of the current user.
      operationId: setMyUserName
      description: set or change the username
      requestBody:
        description: Request details
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/user"
      responses:
        '200':
          description: Username change successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '401':
          description: Action unauthorized - invalid user token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
  
  #upload a photo
  /users/{username}/photos/:
    
    parameters:
    - $ref: "#/components/parameters/username"
    post:
      tags: ["Photo"]
      summary: uploadPhoto - Uploads a new photo to the current user's profile.
      operationId: uploadPhoto
      description: upload a photo linked to the id of the user.
      
      requestBody:
        description: The photo to upload
        content:
          image/png:
            schema:
              $ref: "#/components/schemas/photo"
      responses:
        '201':
          description: Photo successfully uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '401':
          description: Action unauthorized - invalid user token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
    
  #delete post
  /users/{username}/photos/{PhotoId}:
    parameters:
    - $ref: "#/components/parameters/PhotoId" 
    - $ref: "#/components/parameters/username"
    delete:
      tags: ["Photo"]
      summary: deletePhoto - Deletes a previously uploaded photo.
      operationId: deletePhoto
      description: remove a photo from a users profile
      responses:
        '200':
          description: Photo successfully deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '401':
          description: Action unauthorized - invalid user token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
  
  #liking/unliking a photo
  /users/{username}/likes/{PhotoId}:
    parameters:
    - $ref: "#/components/parameters/PhotoId" 
    - $ref: "#/components/parameters/username"
        
    put:
      tags: ["Photo interaction"]
      summary: likePhoto - Marks a StreamPost as liked by the current user.
      operationId: likePhoto
      description: increase the like counter by one under the post linked to the users id.
      responses:
        '200':
          description: Photo successfully liked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '400':
          description: Incorrect request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '401':
          description: Action unauthorized - invalid user token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
  
#unliking a photo
  /users/{username}/unlikes/{PhotoId}:  
    parameters:
    - $ref: "#/components/parameters/PhotoId" 
    - $ref: "#/components/parameters/username"
    delete:
      tags: ["Photo interaction"]
      operationId: unlikephoto 
      summary: remove a like to a users post
      description: "decrease the like counter by one under the post linked to the users id."
      responses:
        '200':
          description: Photo successfully unliked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '400':
          description: Incorrect request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '401':
          description: Action unauthorized - invalid user token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
  
  #commenting on a photo
  /users/{username}/comments/{PhotoId}:
    parameters:
    - $ref: "#/components/parameters/PhotoId" 
    - $ref: "#/components/parameters/username"
    post:
      tags: ["Photo interaction"]
      operationId: "commentPhoto"
      summary: add a comment to a users post
      description: another user comments on a post
      requestBody:
        description: The contents of the comment to be uploaded
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentContents"
      
      responses: 
        "201": 
          description: commented
          content:
            application/json:
              schema: { $ref: "#/components/schemas/comment"}
        '401':
          description: Action unauthorized - invalid user token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
   
  #uncommenting    
  /users/{username}/comments/{PhotoId}/{Commentid}:
    parameters:
    - $ref: "#/components/parameters/PhotoId" 
    - $ref: "#/components/parameters/username"
    - $ref: "#/components/parameters/Commentid"
    delete:
      tags: ["Photo interaction"]
      
      operationId: "uncommentPhoto"
      summary: remove a comment from a users post
      description: uncomment on a post
      
      
          
      responses:
        "200":  
          description: comment deleted successfully 
          content:
            application/json:
              schema: 
                $ref: "#/components/schemas/comment"
        "403":  
          description: Unauthorized - Only the author can delete the comment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "404":  
          description: Comment or post not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500": 
          description: Internal Server Error - could be error of authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
  
  #follow a user
  /users/{username}/follow/{target_username}: 
    parameters:
    - $ref: "#/components/parameters/target_username"
    - $ref: "#/components/parameters/username"
    post:
      tags: ["User interaction"]
      
      operationId: "followuser"
      summary: follow a user
      description: add this user to the list of users our user follows
      responses:
        '200':
          description: User successfully followed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '400':
          description: Incorrect request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '401':
          description: Action unauthorized - invalid user token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
          
  #get user list
  /users:
    get:
      tags: ["User"]
      summary: getUsers - Retrieves a list of all users registered in the database.
      operationId: getUsers
      
      responses:
        '200':
          description: User list successfully retrieved
          content: 
            application/json: 
              schema: 
                type: array
                minItems: 0
                maxItems: 800
                items: { $ref: "#/components/schemas/user" }
        '401':
          description: Action unauthorized - invalid user token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"  
 
  #get user followers
  /users/{username}/followers/{target_username}: 
    parameters:
    - $ref: "#/components/parameters/username"
    - $ref: "#/components/parameters/target_username"
    get:
     
      tags: ["User interaction"]
          
      operationId: "getfollowers"
      summary: retrive followers 
      description: get a list of followers for this user id. 
      
          
      responses: 
        "200": 
          description: list of followers
          content: 
            application/json: 
              schema: 
                type: array
                minItems: 0
                maxItems: 800
                items: { $ref: "#/components/schemas/user" }
        "401": 
          description: Unauthorized - Authentication failed or token expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"

        "500": 
          description: Internal Server Error - could be error of authentication 
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "404": 
          description: user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
  
  
  #get user following  
  /users/{username}/following/{target_username}:
    parameters:
    - $ref: "#/components/parameters/username"
    - $ref: "#/components/parameters/target_username"
    
    get:
      tags: ["User interaction"]
          
      operationId: getfollowing
      summary: retrive followers 
      description: get a list of followers for this user id. 
      
      responses: 
        "200": 
          description: list of following
          content: 
            application/json: 
              schema: 
                type: array
                minItems: 0
                maxItems: 800
                items: { $ref: "#/components/schemas/user" }  
        "401": 
          description: Unauthorized - Authentication failed or token expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500": 
          description: Internal Server Error - could be error of authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "404": 
          description: user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
                    
   
  #remove a user from following
  /users/{username}/unfollow/{target_username}: 
    parameters:
    - $ref: "#/components/parameters/target_username"
    - $ref: "#/components/parameters/username"
    
    delete:
      tags: ["User interaction"]
      
      operationId: unfollowuser
      summary: unfollow user
      description: Remove a user from the following list.
    
         
      responses:
      
        "204":  
          description: unfollowed 
        '400':
          description: Incorrect request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '401':
          description: Action unauthorized - invalid user token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
  
 #ban a user
  /users/{username}/ban/{target_username}:
    parameters:
    - $ref: "#/components/parameters/target_username"
    - $ref: "#/components/parameters/username"
    put:
      
      tags: ["User interaction"]
        
      operationId: banUser
      summary: Ban a user
      description: Add this user to the list of banned users for the current user
      
      responses:
        "200":
          description: User banned successfully
          links:
            removeFollower:
              operationId: removeUser
              parameters:
                Userid_1: $request.path.target_username
        "400":
          description: Bad request - Invalid input or target user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "403":
          description: Forbidden - You cannot ban yourself
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500":
          description: Internal Server Error - Could be an issue with authentication or server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"

 #Get banned a user
  /users/{username}/banned/{target_username}:
    parameters:
        - $ref: "#/components/parameters/target_username"
        - $ref: "#/components/parameters/username"
    get: 
      operationId: getbannedusers
      summary: ban a user
      tags: ["User interaction"]
      description: retrive a list of banned users
      
      responses: 
          "200": 
            description: list retrived
            content:
              application/json:
                schema: 
                  type: array
                  minItems: 0
                  maxItems: 800
                  items: { $ref: "#/components/schemas/user" }
  
#unbanuser
  /users/{username}/unban/{target_username}: 
    parameters:
    - $ref: "#/components/parameters/target_username"
    - $ref: "#/components/parameters/username"
    delete:
      tags: ["User interaction"]
      operationId: unbanuser
      summary: Unban a user
      description: Remove a user from the banned list.
      responses:
        '200':
          description: User successfully unbanned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '400':
          description: Incorrect request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '401':
          description: Action unauthorized - invalid user token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
  
#get user profil
  /users/{username}/profile/{target_username}:
    parameters:
    - $ref: "#/components/parameters/target_username"
    - $ref: "#/components/parameters/username"
    get:
     
      tags: ["User"]
      
      operationId: getuserprofil
      summary: Retrieve user profile
      description: retriev a users profile contaning all the info. 
      
      
      responses: 
        "200": 
          description: profil retrived
          content: 
            application/json: 
              schema: { $ref: "#/components/schemas/profil" }
        
      
        "401":
          description: Action unauthorized - invalid user token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
    
        "404":
          description: User or target user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
    
        "500":
          description: Internal Server Error - Could be an issue with authentication or server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
  
#getstream
  /users/{username}/stream/{target_username}:
    parameters:
    - $ref: "#/components/parameters/target_username"
    - $ref: "#/components/parameters/username"
    get:
     
      tags: ["User"]
      
      operationId: getmystream
      summary: Retrieve user stream
      description: retriev a users' profile contaning all the info. 
      
      responses: 
        "200": 
          description: photos retrived
          content: 
            application/json: 
              schema: { $ref: "#/components/schemas/photo" }
        
        "400":
           description: Bad request - Invalid input or malformed request
           content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
      
        "401":
          description: Unauthorized - Authentication failed or token expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
    
        "404":
          description: User or target user not found or mismatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
    
        "500":
          description: Internal Server Error - Could be an issue with authentication or server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: string

  schemas:
    
    user:
      title: "User"
      description: "An object that represents a user of the application."
      type: object
      properties:
        username:
          description: "A username serving as a unique user ID"
          type: string
          pattern: '^.*?$'
          minLength: 3
          maxLength: 16
          example: "rodi"
  
        profile:
          description: "The profile of a user containing all the information about the user."
          type: array
          minItems: 0
          maxItems: 800
          items:
            $ref: '#/components/schemas/profil'

    UserToken:
      description: A user session token
      type: integer
      example: 0987654321
    
   
    post:
      title: "Post"
      description: "An object that represents a post displayed on the user's profile."
      type: object
      properties:
        username:
          description: "A username serving as a unique user ID"
          type: string
          pattern: '^.*?$'
          minLength: 3
          maxLength: 16
          example: "rodi"
    
        PhotoId:
          $ref: "#/components/schemas/PhotoId"
 
                  
        
             
    like:
      title: "Like"
      description: "An object containing a count of likes and a list of users who liked the image."
      type: object
      properties:
        username:
          description: "A username serving as a unique user ID"
          type: string
          pattern: '^.*?$'
          minLength: 3
          maxLength: 16
          example: "rodi"
    
        likes:
          type: array
          description: "A list of usernames who liked the post."
          items:
            $ref: "#/components/schemas/user"
    
        like_count:
          type: integer
          description: "Total number of likes the picture has."
          example: 8
    
        PhotoId:
          $ref: "#/components/schemas/PhotoId"
  
    
    CommentContents:
      description: The text contents of a comment
      type: string
      example: "Such is life on Mars..."
    
    Timestamp:
      description: UNIX date and time information
      type: integer
      example: 1707134325
    
    comment:
      title: "Comment"
      description: "Text that users leave on a post."
      type: object
      properties:
        user:
          $ref: "#/components/schemas/user"
    
        comment:
          $ref: "#/components/schemas/CommentContents"
    
        comment_count:
          type: integer
          description: "Total number of comments left on the post."
          example: 5
    
        PhotoId:
          $ref: "#/components/schemas/PhotoId"
    
        date_time:  
          $ref: "#/components/schemas/Timestamp"
    
    PhotoId:
      description: ID of a photo
      type: integer
      example: 1928374650
    
    photo:
      title: "Photo"
      description: "An object that represents a photo displayed on the user's profile."
      type: object
      properties:
        username:
          $ref: "#/components/schemas/user"
    
        picture:
          type: string
          format: binary
          description: "The image file to upload. Consider the encoding in the backend."
          
          minLength: 3
          maxLength: 10485760  
    
        caption:
          type: string
          description: "Additional text associated with the picture."
          minLength: 3
          maxLength: 256  
    
        date_time:  
          $ref: "#/components/schemas/Timestamp"
    
        likes:
          description: "Reactions to the post."
          type: array
          minItems: 0
          maxItems: 800
          items:
            $ref: '#/components/schemas/like'
    
        comments:
          description: "Text left on a post by users."
          type: array
          minItems: 0
          maxItems: 800
          items:
            $ref: '#/components/schemas/comment'

    
    
    profil:
      title: "Profile"
      description: "An object that displays content and information from the user, such as the user’s photos, number of photos, followers, and following."
      type: object
      
      properties:
        username:
          $ref: "#/components/schemas/user"
    
        profile_pic:
          type: string
          format: binary
          description: "The image file to upload. Consider the encoding in the backend."
          minLength: 3
          maxLength: 10485760  
    
        stream:
          description: "List of profiles of the people a user follows."
          type: array
          minItems: 0
          maxItems: 800
          items: 
            $ref: '#/components/schemas/post'
    
        followers:
          description: "The number of users that follow a certain account."
          type: integer
    
        following:
          description: "The number of users a certain account follows."
          type: integer
    
        bans:  # Changed to plural for consistency
          description: "The number of accounts a user has blocked."
          type: integer
      
    EmptyResponse:
      description: Returned when the respone is empty
      type: object 


    
  parameters:
    username:
      name: username
      in: path
      required: true
      description: "The name of the user"
      schema:
        description: "The name of the user"
        type: string
        example: "mimi"
        minLength: 3
        maxLength: 16

    
    target_username:
      name: target_username
      in: path
      required: true
      description: "The name of the target user"
      schema:
        description: "The name of the target user"
        type: string
        example: "mimi"
        minLength: 3
        maxLength: 16

      
    PhotoId:
      name: PhotoId
      in: path
      required: true
      description: "ID of the photo"
      schema:
        description: "ID of the photo"
        type: integer
        example: 5
        readOnly: true

    Commentid:
      name: Commentid
      in: path
      required: true
      description: "ID of the comment"
      schema:
        description: "ID of the comment"
        type: integer
        example: 7
        readOnly: true
  