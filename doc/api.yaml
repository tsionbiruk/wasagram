openapi: 3.0.3
info:
  title: WasaPhoto
  description: API documentation for the WasaPhoto project.
  version: 1.0.0


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas: 
    user:
      title: "user"
      description: object that uses this app
      type: object
      properties: 
        username:
          description: unique identifier for the user. The user name
          type: string
          example: "maria"
          readOnly: false
        
        profil:
          type: array
          items: 
            $ref: '#/components/schemas/profil'
    
   
    post: 
      title: Post
      description: object that user displays on profil
      type : object
      properties: 
        username:
          type: string
        
        PhotoId:
          type: integer
          
          description: The unique identifier of the image 
                  
        
             
    like: 
      title: like
      description: object contaianing a count and list of users that liked the image
      type: object 
      properties: 
      
        username: 
          type: string
          description: name of the user that liked the post
          example: "abel"
        
        likes: 
          type: string
          description: usernamw that liked the post 
          example: "sarah"
        
        like_count: 
          type: integer
          description: total number of likes a picture has
          example: 8
        
        PhotoId: 
          type: integer
          description: id of the photo the user liked
          example: 6
    
    comment: 
      title: comment
      description: text users leave on a post
      type: object
      properties: 
        
        username: 
          type: string
          description: name of the user that commented on the post
          example: "abel"
          
        comment: 
          type: string
          description: text left by a useron a post
          example: "slay"
        
        comment_count: 
          type: integer
          description: number of comments left on a post 
          example: 5
        
        PhotoId: 
          type: integer
          description: id of the photo the user commented on
          example: 6
          
        date-time: 
          type: string
          description: upload time of the comment
          format: date-time
          example: "2024-08-07T14:20:00Z"
    
    photo: 
      title: Photo
      description: object that user displays on profil
      type : object
      properties: 
        
        username: 
          type: string
          description: name of the user that made the post
          example: "abel"
        
        picture:
          type: string
          format: binary
          #think about the encoding in the backend 
          description: The image file to upload
                  
        caption: 
           type: string
           description: Additional text associated with the picture
        
        
        date-time: 
          type: string
          description: upload time of the post
          format: date-time
          example: "2024-08-07T14:20:00Z"
          
        like: 
          type: array
          items: 
            
             $ref: '#/components/schemas/like'
          
        comment: 
          type: array
          items: 
             $ref: '#/components/schemas/comment'
    
    profil: 
      title: "profil"
      description: object that displays content and info from the user such as the user’s photos, number of photo, followers and following
      type: object
      
      properties:
        username:
          type: string
          #each profil is linked with a user
        profile_pic:
          type: string
          format: binary
          #think about the encoding in the backend 
          description: The image file to upload 
        
        stream:
          type: array
          items: 
            $ref: '#/components/schemas/post'
        
        followers: 
          description: The number of users that follow a certain account
          type: integer
        
        following: 
          description: The number of users a certain account follows
          type: integer
          
        ban:
          description: The number of accounts a user blocked
          type: integer

    
  parameters:
    username:
      schema:
        type: string
        example: "mimi"
       
      name: username
      in : path
      required: true
      description: name of the user
    
    target_username:
      schema:
        type: string
        example: "mimi"
       
      name: target_username
      in : path
      required: true
      description: name of the target user
      
    PhotoId: 
      schema:
        type: integer
        example: 5
        readOnly: true 
      name: PhotoId
      in : path
      required: true
      description: Id of the photo
    
    Commentid: 
      schema:
        type: integer
        example: 7
        readOnly: true 
      name: Commentid
      in : path
      required: true
      description: Id of the comment
    
   
security:
  - BearerAuth: []


paths:
  /session:
    post:
      security:
      - BearerAuth: []
    
    
      tags: ["login"]
      summary: Logs in the user
      description: |-
        If the user does not exist, it will be created,
        and an identifier is returned.
        If the user exists, the user identifier is returned.
      operationId: doLogin
      requestBody:
        description: User details
        content:
          application/json:
            schema:
              
              type: string
              example: Maria
              pattern: 'ˆ.*?$'
              minLength: 3
              maxLength: 16
        required: true
      responses:
        '201':
          description: User log-in action successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  identifier:
                    
                    type: integer
                    example: 784
        '400': 
          description: Bad Request. Username doesnt fit the description.
        
  
  #updating username  
  /user/{username}:
    
    put:
      security:
      - BearerAuth: []
      
      operationId: "SetUserName"
      description: change the unique identifier of a pre-existing user.
      
      parameters:
      - $ref: "#/components/parameters/username"
      
      requestBody:
        content:
          application/json:
            schema:
              
              type: string
              example: Maria
              
      

      responses:
        "200":
          description: Username updated successfully.
      
        "400":
          description: Bad request. Username doesn't exist or validation failed.

        "500":
          description: Internal Server Error. Could be an error in authentication or processing.
  
  #upload a photo
  /user/{username}/photo/:
    
    post:
      security:
      - BearerAuth: []
      
      operationId: "Uploadphoto"
      summary: creating a new post 
      description: upload a photo linked to the id of the user.
      
      parameters:
      - $ref: "#/components/parameters/username"
      
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
                  description: The photo file to upload.
                  
      responses:
        "201":
          description: Photo uploaded successfully.
          content:
            application/json:
              schema: 
                $ref: "#/components/schemas/post"  # If a post object is returned, ensure this reflects the actual response
        
        "400":
          description: Bad Request. Username doesn't exist or invalid request.
  
        "404":
          description: Invalid photo format or photo not found.
  
        "500":
          description: Internal Server Error - Could be an error of authentication or server issue.
    
  #delete post
  /user/{username}/photo/{PhotoId}:
    delete:
      security:
      - BearerAuth: []  
    
      operationId: "Deletephoto"
      summary: deleting a post
      description: delete a post linked to the id of the user.
      
      parameters:
      - $ref: "#/components/parameters/PhotoId" 
      - $ref: "#/components/parameters/username"
      
      responses:
        "204":
          description: Photo deleted successfully.
          
        "404":
          description: Photo or username not found.
        
        "500":
          description: Internal Server Error - could be due to authentication issues or other server errors.
  
  #liking/unliking a photo
  /user/{username}/target_user/{target_username}/photo/{PhotoId}/like:
    
    put:
      security:
      - BearerAuth: [] 
      
      operationId: "likephoto"
      summary: add a like to a users post
      description: increase the like counter by one under the post linked to the users id.
      
      parameters:
        - $ref: "#/components/parameters/PhotoId" 
        - $ref: "#/components/parameters/username"
        - $ref: "#/components/parameters/target_username"
        
      responses:
        "200":
          description: Photo liked. Like count updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Photo liked successfully."
                  likes:
                    type: integer
                    example: 101  # Example updated like count
  
        "404":
          description: Photo not found or invalid username.
        
        "500":
          description: Internal Server Error - could be due to authentication or processing issues.
        
    delete:
      
      
      tags: ["Unlikephoto"]
      summary: remove a like to a users post
      description: decrease the like counter by one under the post linked to the users id.
      parameters:
        - $ref: "#/components/parameters/PhotoId" 
        - $ref: "#/components/parameters/username"
        - $ref: "#/components/parameters/target_username"
        
      responses:
        "204":
          description: Photo unliked. Like count updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Photo unliked successfully."
                  likes:
                    type: integer
                    example: 100  # Example updated like count

        "400":
          description: Photo or username not found.
        
        "404":
          description: Photo wasn't previously liked.
        
        "500":
          description: Internal Server Error - could be due to authentication or processing issues.
  
  #commenting on a photo
  /user/{username}/photo/{PhotoId}/comment:
    
    post:
      security:
      - BearerAuth: [] 
      
      operationId: "commentPhoto"
      summary: add a comment to a users post
      
      parameters:
        - $ref: "#/components/parameters/PhotoId" 
        - $ref: "#/components/parameters/username"
          
      requestBody: 
        content: 
          application/json: 
            schema:
              type: object
              properties: 
                commontext: 
                  type: string
      
      responses: 
        "200": 
          description: commented
          content:
            application/json:
              schema: { $ref: "#/components/schemas/comment"}
        "404": 
          description: bad request. user or post not found.
        "500": 
            description: Internal Server Error - could be error of authentication 
   
  #uncommenting    
  /user/{username}/photo/{PhotoId}/comment/{Commentid}:
    
    delete:
      security:
      - BearerAuth: [] 
      
      operationId: "uncommentPhoto"
      summary: remove a comment from a users post
      
      parameters:
          - $ref: "#/components/parameters/PhotoId" 
          - $ref: "#/components/parameters/username"
          - $ref: "#/components/parameters/Commentid"
          
      responses:
        "200":  
          description: comment deleted successfully 
          content:
            application/json:
              schema: { $ref: "#/components/schemas/comment"}
        "403":  
          description: Unauthorized - Only the author can delete the comment. 
        "404":  
          description: Comment or post not found.
        "500": 
            description: Internal Server Error - could be error of authentication 
  
  #follow a user
  /user/{username}/follow/target_user/{target_username}: 
    
    post:
      security:
      - BearerAuth: [] 
      
      operationId: "followuser"
      summary: follow a user
      description: add this user to the list of users our user follows
      
      parameters:
         - $ref: "#/components/parameters/target_username"
         - $ref: "#/components/parameters/username"
         
      responses: 
        "200": 
          description: user followed successfully
        "409":
          description: user is already followed

        
        "400": 
          description: Cannot follow yourself
        "500": 
            description: Internal Server Error - could be error of authentication 
          
    
  #get user followers
  /user/{username}/followers/target_user/{target_username}: 
    
    get:
      security:
      - BearerAuth: [] 
          
      operationId: "getfollowers"
      summary: retrive followers 
      description: get a list of followers for this user id. 
      
      parameters:
           
          - $ref: "#/components/parameters/username"
          - $ref: "#/components/parameters/target_username"
          
      responses: 
        "200": 
          description: list of followers
          content: 
            application/json: 
              schema: 
                type: array
                items: { $ref: "#/components/schemas/user" }
        "401": 
          description: Unauthorized - Authentication failed or token expired

        "500": 
            description: Internal Server Error - could be error of authentication 
        "404": 
          description: user not found
  
  
  #get user following  
  /user/{username}/following/target_user/{target_username}:
    
    get:
      security:
      - BearerAuth: [] 
          
      operationId: "getfollowing"
      summary: retrive followers 
      description: get a list of followers for this user id. 
      
      parameters:
           
        - $ref: "#/components/parameters/username"
        - $ref: "#/components/parameters/target_username"
      responses: 
        "200": 
          description: list of following
          content: 
            application/json: 
              schema: 
                type: array
                items: { $ref: "#/components/schemas/user" }  
        "401": 
          description: Unauthorized - Authentication failed or token expired
        "500": 
            description: Internal Server Error - could be error of authentication 
        "404": 
          description: user not found
   
  #remove a user from following
  /user/{username}/unfollow/target_user/{target_username}: 
    
    delete:
      security:
      - BearerAuth: []
      
      operationId: unfollowuser
      summary: unfollow user
      description: Remove a user from the following list.
      
      parameters:
         - $ref: "#/components/parameters/target_username"
         - $ref: "#/components/parameters/username"
         
      responses:
      
        "200":  
          description: unfollowed 
        "400":
         description: Bad request - The target user does not exist or invalid input

        "401":
         description: Unauthorized - Authentication failed or token expired
        
        "500": 
            description: Internal Server Error - could be error of authentication 
  
  #remove a user from followers
  /user/{username}/follower/target_user/{target_username}:
    
    delete:
      security:
      - BearerAuth: [] 
          
      operationId: "removeuser"
      summary: remove user from followers 
      parameters:
           
         - $ref: "#/components/parameters/target_username"
         - $ref: "#/components/parameters/username"
      
      responses: 
        "200": 
          description: user removed
        "400":
          description: Bad request - The target user does not exist or invalid input

        "401":
          description: Unauthorized - Authentication failed or token expired
        
        "500": 
            description: Internal Server Error - could be error of authentication 
  
 #ban a user
  /user/{username}/ban/target_user/{target_username}:
    
    put:
      security:
        - BearerAuth: []
      operationId: "banUser"
      summary: Ban a user
      description: Add this user to the list of banned users for the current user
      parameters:
         - $ref: "#/components/parameters/target_username"
         - $ref: "#/components/parameters/username"
      responses:
        "200":
          description: User banned successfully
          links:
            removeFollower:
              operationId: removeUser
              parameters:
                Userid_1: $request.path.target_username
        "400":
          description: Bad request - Invalid input or target user not found
        "403":
          description: Forbidden - You cannot ban yourself
        "500":
          description: Internal Server Error - Could be an issue with authentication or server

    get: 
      operationId: "getbannedusers"
      
      description: retrive a list of banned users
      parameters:
        - $ref: "#/components/parameters/target_username"
        - $ref: "#/components/parameters/username"
      responses: 
          "200": 
            description: list retrived
            content:
              application/json:
                schema: 
                  type: array
                  items: { $ref: "#/components/schemas/user" }
  
#unbanuser
  /user/{username}/unban/target_user/{target_username}: 
    
    delete:
      security:
      - BearerAuth: []
      
      operationId: unbanuser
      summary: Unban a user
      description: Remove a user from the banned list.
      
      
      parameters:
         - $ref: "#/components/parameters/target_username"
         - $ref: "#/components/parameters/username"
      responses:
        "204":
          description: User successfully unbanned
    
        "400":
          description: Bad request - Invalid input or malformed request
    
        "401":
          description: Unauthorized - Authentication failed or token expired
    
        "404":
          description: User or target user not found
    
        "500":
          description: Internal Server Error - Could be an issue with authentication or server 
  
#get user profil
  /user/{username}/target_user/{target_username}/profile:
    get:
      security:
      - BearerAuth: []
      
      operationId: getuserprofil
      summary: Retrieve user profile
      description: retriev a users profile contaning all the info. 
      
      parameters:
         
        - $ref: "#/components/parameters/target_username"
        - $ref: "#/components/parameters/username"
      responses: 
        "200": 
          description: profil retrived
          content: 
            application/json: 
              schema: { $ref: "#/components/schemas/profil" }
        
        "400":
          description: Bad request - Invalid input or malformed request
      
        "401":
          description: Unauthorized - Authentication failed or token expired
    
        "404":
          description: User or target user not found
    
        "500":
          description: Internal Server Error - Could be an issue with authentication or server 
  
#getstream
  /user/{username}/target_user/{target_username}/stream:
    get:
      security:
      - BearerAuth: []
      
      operationId: getmystream
      summary: Retrieve user stream
      description: retriev a users' profile contaning all the info. 
      
      parameters:
         
         - $ref: "#/components/parameters/target_username"
         - $ref: "#/components/parameters/username"
      responses: 
        "200": 
          description: photos retrived
          content: 
            application/json: 
              schema: { $ref: "#/components/schemas/photo" }
        
        "400":
           description: Bad request - Invalid input or malformed request
      
        "401":
          description: Unauthorized - Authentication failed or token expired
    
        "404":
          description: User or target user not found or mismatched
    
        "500":
          description: Internal Server Error - Could be an issue with authentication or server            
  