openapi: 3.0.3

info:
  title: WasaPhoto
  
  description: API documentation for the WasaPhoto project.
  version: 1.0.0


components:
  securitySchemes:
    BearerAuth:
      
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas: 
    user:
      title: "user"
      description: object that uses this app
      type: object
      properties: 
        username:
          description: unique identifier for the user. The user name
          type: string
          example: "maria"
          minLength: 3
          maxLength: 16
          readOnly: false
        
        profil:
          description: the profile of a user containing all the information about the user
          type: array
          minItems: 0
          maxItems: 800
          items: 
            $ref: '#/components/schemas/profil'
    
   
    post: 
      title: Post
      description: object that user displays on profil
      type : object
      properties: 
        username:
          description: unique identifier for the user. The user name that is the owner of the post
          type: string
          example: "maria"
          minLength: 3
          maxLength: 16
        
        PhotoId:
          type: integer
          
          description: The unique identifier of the image 
                  
        
             
    like: 
      title: like
      description: object contaianing a count and list of users that liked the image
      type: object 
      properties: 
      
        username: 
          type: string
          description: name of the user that liked the post
          example: "abel"
          
          minLength: 3
          maxLength: 16
        
        likes: 
          type: string
          description: usernamw that liked the post 
          example: "sarah"
          minLength: 3
          maxLength: 16
        
        like_count: 
          type: integer
          description: total number of likes a picture has
          example: 8
        
        PhotoId: 
          type: integer
          description: id of the photo the user liked
          example: 6
    
    comment: 
      title: comment
      description: text users leave on a post
      type: object
      properties: 
        
        username: 
          type: string
          description: name of the user that commented on the post
          example: "abel"
          minLength: 3
          maxLength: 16
          
        comment: 
          type: string
          description: text left by a useron a post
          example: "slay"
          minLength: 3
          maxLength: 16
        
        comment_count: 
          type: integer
          description: number of comments left on a post 
          example: 5
        
        PhotoId: 
          type: integer
          description: id of the photo the user commented on
          example: 6
          
        date-time: 
          type: string
          description: upload time of the comment
          format: date-time
          example: "2024-08-07T14:20:00Z"
    
    photo: 
      title: Photo
      description: object that user displays on profil
      type : object
      properties: 
        
        username: 
          type: string
          description: name of the user that made the post
          example: "abel"
          minLength: 3
          maxLength: 16
        
        picture:
          
          type: string
          format: binary
          #think about the encoding in the backend 
          description: The image file to upload
                  
        caption: 
           type: string
           description: Additional text associated with the picture
        
        
        date-time: 
          type: string
          description: upload time of the post
          format: date-time
          example: "2024-08-07T14:20:00Z"
          
        like: 
          description: reaction to a post
          type: array
          minItems: 0
          maxItems: 800
          items: 
            
             $ref: '#/components/schemas/like'
          
        comment: 
          description: text left on a post by a user
          type: array
          minItems: 0
          maxItems: 800
          items: 
             $ref: '#/components/schemas/comment'
    
    profil: 
      title: "profil"
      description: object that displays content and info from the user such as the user’s photos, number of photo, followers and following
      type: object
      
      properties:
        username:
          description: unique identifier for the user. The user name that ownes the profile
          type: string
          minLength: 3
          maxLength: 16
          #each profil is linked with a user
        profile_pic:
          
          type: string
          format: binary
          #think about the encoding in the backend 
          description: The image file to upload 
        
        stream:
          description: list of proils of the people a user follows
          type: array
          minItems: 0
          maxItems: 800
          items: 
            $ref: '#/components/schemas/post'
        
        followers: 
          description: The number of users that follow a certain account
          type: integer
        
        following: 
          description: The number of users a certain account follows
          type: integer
          
        ban:
          description: The number of accounts a user blocked
          type: integer

    
  parameters:
    username:
      schema:
        type: string
        example: "mimi"
        minLength: 3
        maxLength: 16
       
      name: username
      in : path
      required: true
      description: name of the user
    
    target_username:
      schema:
        type: string
        example: "mimi"
        minLength: 3
        maxLength: 16
       
      name: target_username
      in : path
      required: true
      description: name of the target user
      
    PhotoId: 
      schema:
        type: integer
        example: 5
        readOnly: true 
      name: PhotoId
      in : path
      required: true
      description: Id of the photo
    
    Commentid: 
      schema:
        type: integer
        example: 7
        readOnly: true 
      name: Commentid
      in : path
      required: true
      description: Id of the comment
    
   
security:
  - BearerAuth: []


paths:
  /session:
    post:
      security:
      - BearerAuth: []
    
    
      tags: ["login"]
      summary: Logs in the user
      description: |-
        If the user does not exist, it will be created,
        and an identifier is returned.
        If the user exists, the user identifier is returned.
      operationId: doLogin
      requestBody:
        description: User details
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Maria
                  
                  minLength: 3
                  maxLength: 16
        required: true
      responses:
        '201':
          description: User log-in action successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  identifier:
                    
                    type: integer
                    example: 784
        '400': 
          description: Bad Request. Username doesnt fit the description.
        
  
  #updating username  
  /users/{username}/username:
    
    put:
      security:
      - BearerAuth: []
      
      tags: ["Rename"]
      
      operationId: "SetUserName"
      summary: update the username
      description: change the unique identifier of a pre-existing user.
      
      parameters:
      - $ref: "#/components/parameters/username"
      
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/user"}
      

      responses:
        "201":
          description: Username updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  identifier:
                    
                    type: string
                    example: "rodi"
                    minLength: 3
                    maxLength: 16
      
        "400":
          description: Bad request. Username doesn't exist or validation failed.
          
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50

        "500":
          description: Internal Server Error. Could be an error in authentication or processing.
          
          content:
            application/json:  # Content type is defined because a body is returned
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
  
  #upload a photo
  /users/{username}/photos/:
    
    post:
      security:
      - BearerAuth: []
      
      tags: ["Photo"]
      
      operationId: "Uploadphoto"
      summary: creating a new post 
      description: upload a photo linked to the id of the user.
      
      parameters:
      - $ref: "#/components/parameters/username"
      
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
                  description: The photo file to upload.
                  
      responses:
        "201":
          description: Photo uploaded successfully.
          content:
            application/json:
              schema: 
                $ref: "#/components/schemas/post"  # If a post object is returned, ensure this reflects the actual response
        
        "400":
          description: Bad Request. Username doesn't exist or invalid request.
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
  
        "404":
          description: Invalid photo format or photo not found.
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
  
        "500":
          description: Internal Server Error - Could be an error of authentication or server issue.
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
    
  #delete post
  /users/{username}/photos/{PhotoId}:
    delete:
      security:
      - BearerAuth: []  
      
      tags: ["Photo"]
    
      operationId: "Deletephoto"
      summary: deleting a post
      description: delete a post linked to the id of the user.
      
      parameters:
      - $ref: "#/components/parameters/PhotoId" 
      - $ref: "#/components/parameters/username"
      
      responses:
        "204":
          description: Photo deleted successfully.
          
          
        "404":
          description: Photo or username not found.
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
        
        "500":
          description: Internal Server Error - could be due to authentication issues or other server errors.
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
  
  #liking/unliking a photo
  /users/{username}/likes/{PhotoId}:
    
    put:
      security:
      - BearerAuth: [] 
      
      tags: ["like"]
      operationId: "likephoto"
      summary: add a like to a users post
      description: increase the like counter by one under the post linked to the users id.
      
      parameters:
        - $ref: "#/components/parameters/PhotoId" 
        - $ref: "#/components/parameters/username"
        
        
      responses:
        "200":
          description: Photo liked. Like count updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Photo liked successfully."
                    minLength: 3
                    maxLength: 50
                  likes:
                    type: integer
                    example: 101  # Example updated like count
  
        "404":
          description: Photo not found or invalid username.
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
        
        "500":
          description: Internal Server Error - could be due to authentication or processing issues.
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
  
#unliking a photo
  /users/{username}/unlikes/{PhotoId}:     
    delete:
      security:
      - BearerAuth: [] 
      
      tags: ["like"]
      operationId: unlikephoto 
      summary: remove a like to a users post
      description: decrease the like counter by one under the post linked to the users id.
      parameters:
        - $ref: "#/components/parameters/PhotoId" 
        - $ref: "#/components/parameters/username"
        
        
      responses:
        "204":
          description: Photo unliked. Like count updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
                    example: "Photo unliked successfully."
                  likes:
                    type: integer
                    example: 100  # Example updated like count

        "400":
          description: Photo or username not found.
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
        
        "404":
          description: Photo wasn't previously liked.
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
        
        "500":
          description: Internal Server Error - could be due to authentication or processing issues.
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
  
  #commenting on a photo
  /users/{username}/comments/{PhotoId}:
    
    post:
      security:
      - BearerAuth: [] 
      
      tags: ["comment"]
      operationId: "commentPhoto"
      summary: add a comment to a users post
      description: another user comments on a post
      
      parameters:
        - $ref: "#/components/parameters/PhotoId" 
        - $ref: "#/components/parameters/username"
          
      requestBody: 
        content: 
          application/json: 
            schema:
              type: object
              properties: 
                commontext: 
                  type: string
                  minLength: 1
                  maxLength: 600
      
      responses: 
        "200": 
          description: commented
          content:
            application/json:
              schema: { $ref: "#/components/schemas/comment"}
        "404": 
          description: bad request. user or post not found.
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
        "500": 
          description: Internal Server Error - could be error of authentication 
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
   
  #uncommenting    
  /users/{username}/comments/{PhotoId}/{Commentid}:
    
    delete:
      security:
      - BearerAuth: [] 
      
      tags: ["comment"]
      
      operationId: "uncommentPhoto"
      summary: remove a comment from a users post
      description: uncomment on a post
      
      parameters:
          - $ref: "#/components/parameters/PhotoId" 
          - $ref: "#/components/parameters/username"
          - $ref: "#/components/parameters/Commentid"
          
      responses:
        "200":  
          description: comment deleted successfully 
          content:
            application/json:
              schema: 
                $ref: "#/components/schemas/comment"
        "403":  
          description: Unauthorized - Only the author can delete the comment.
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
        "404":  
          description: Comment or post not found.
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
        "500": 
          description: Internal Server Error - could be error of authentication
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
  
  #follow a user
  /users/{username}/follow/{target_username}: 
    
    post:
      security:
      - BearerAuth: [] 
      
      tags: ["follow"]
      
      operationId: "followuser"
      summary: follow a user
      description: add this user to the list of users our user follows
      
      parameters:
         - $ref: "#/components/parameters/target_username"
         - $ref: "#/components/parameters/username"
         
      responses: 
        "204": 
          description: user followed successfully
        "409":
          description: user is already followed
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50

        
        "400": 
          description: Cannot follow yourself
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
        "500": 
          description: Internal Server Error - could be error of authentication 
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
          
    
  #get user followers
  /users/{username}/followers/{target_username}: 
    
    get:
      security:
      - BearerAuth: [] 
      
      tags: ["followers"]
          
      operationId: "getfollowers"
      summary: retrive followers 
      description: get a list of followers for this user id. 
      
      parameters:
           
          - $ref: "#/components/parameters/username"
          - $ref: "#/components/parameters/target_username"
          
      responses: 
        "200": 
          description: list of followers
          content: 
            application/json: 
              schema: 
                type: array
                minItems: 0
                maxItems: 800
                items: { $ref: "#/components/schemas/user" }
        "401": 
          description: Unauthorized - Authentication failed or token expired
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50

        "500": 
          description: Internal Server Error - could be error of authentication 
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string 
                    minLength: 3
                    maxLength: 50
        "404": 
          description: user not found
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
  
  
  #get user following  
  /users/{username}/following/{target_username}:
    
    get:
      security:
      - BearerAuth: [] 
      
      tags: ["following"]
          
      operationId: getfollowing
      summary: retrive followers 
      description: get a list of followers for this user id. 
      
      parameters:
           
        - $ref: "#/components/parameters/username"
        - $ref: "#/components/parameters/target_username"
      responses: 
        "200": 
          description: list of following
          content: 
            application/json: 
              schema: 
                type: array
                minItems: 0
                maxItems: 800
                items: { $ref: "#/components/schemas/user" }  
        "401": 
          description: Unauthorized - Authentication failed or token expired
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
        "500": 
          description: Internal Server Error - could be error of authentication
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
        "404": 
          description: user not found
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
   
  #remove a user from following
  /users/{username}/unfollow/{target_username}: 
    
    delete:
      security:
      - BearerAuth: []
      
      tags: ["following"]
      
      operationId: unfollowuser
      summary: unfollow user
      description: Remove a user from the following list.
      
      parameters:
         - $ref: "#/components/parameters/target_username"
         - $ref: "#/components/parameters/username"
         
      responses:
      
        "204":  
          description: unfollowed 
        "400":
         description: Bad request - The target user does not exist or invalid input
         content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50

        "401":
         description: Unauthorized - Authentication failed or token expired
         content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
        
        "500": 
          description: Internal Server Error - could be error of authentication
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
  
 #ban a user
  /users/{username}/ban/{target_username}:
    
    put:
      security:
        - BearerAuth: []
        
      tags: ["ban"]
        
      operationId: banUser
      summary: Ban a user
      description: Add this user to the list of banned users for the current user
      parameters:
         - $ref: "#/components/parameters/target_username"
         - $ref: "#/components/parameters/username"
      responses:
        "200":
          description: User banned successfully
          links:
            removeFollower:
              operationId: removeUser
              parameters:
                Userid_1: $request.path.target_username
        "400":
          description: Bad request - Invalid input or target user not found
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
        "403":
          description: Forbidden - You cannot ban yourself
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
        "500":
          description: Internal Server Error - Could be an issue with authentication or server
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50

 #Get banned a user
  /users/{username}/banned/{target_username}:
    get: 
      operationId: getbannedusers
      summary: ban a user
      tags: ["ban"]
      description: retrive a list of banned users
      parameters:
        - $ref: "#/components/parameters/target_username"
        - $ref: "#/components/parameters/username"
      responses: 
          "200": 
            description: list retrived
            content:
              application/json:
                schema: 
                  type: array
                  minItems: 0
                  maxItems: 800
                  items: { $ref: "#/components/schemas/user" }
  
#unbanuser
  /users/{username}/unban/{target_username}: 
    
    delete:
      security:
      - BearerAuth: []
      
      tags: ["ban"]
      operationId: unbanuser
      summary: Unban a user
      description: Remove a user from the banned list.
      
      
      parameters:
         - $ref: "#/components/parameters/target_username"
         - $ref: "#/components/parameters/username"
      responses:
        "204":
          description: User successfully unbanned
    
        "400":
          description: Bad request - Invalid input or malformed request
          content:
            application/json:  
              schema:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 3
                    maxLength: 50
                  message:
                    type: string
                    minLength: 3
                    maxLength: 50
    
        "401":
          description: Unauthorized - Authentication failed or token expired
          content:
            application/json:  
              schema:
